# ========================
# PROCESSING RULES
# ========================

processing_rules:
  - "search image using keyword"
  - "select best image: clear subject, bright lighting, not blurry"
  - "crop center focus landmark; output 1:1 and 16:9"
  - "apply color: increase brightness slightly, add cool tone, increase contrast"
  - "apply overlay: dark gradient bottom"
  - "export webp, optimized size <200kb"

