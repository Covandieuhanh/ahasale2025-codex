# ========================
# CONFIG
# ========================

image_ratio:
  - "1:1"
  - "16:9"
format: webp
style:
  - bright
  - clean
  - high contrast
  - slightly cool tone
overlay:
  gradient: "black bottom fade 40%"
  text_color: white
  show_province_name: true
  show_listing_count: optional

naming:
  prefix: province-
  format: lowercase-no-accent

search_pattern: "{keyword} vietnam landscape high quality"

# ========================
