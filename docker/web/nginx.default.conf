server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 ahasale.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name localhost 127.0.0.1 ahasale.local;

    ssl_certificate /app/docker/certs/ahasale.local.pem;
    ssl_certificate_key /app/docker/certs/ahasale.local-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    client_max_body_size 25m;

    root /app;
    index Default.aspx default.aspx index.html;

    location = /shop {
        return 302 /shop/login.aspx;
    }

    location = /shop/ {
        return 302 /shop/login.aspx;
    }

    location = /shop/quan-ly-tin/default.aspx {
        return 302 /shop/quan-ly-tin;
    }

    location = /shop/quan-ly-tin/them.aspx {
        return 302 /shop/quan-ly-tin/them;
    }

    location = /login.aspx {
        return 302 /dang-nhap;
    }

    location = /login {
        return 302 /dang-nhap;
    }

    location / {
        rewrite ^/test/([^/]+)/([^/]+)\.html$ /url.aspx?id=$1&name=$2 last;
        rewrite ^/bao-tri$ /home/bao-tri.aspx last;
        rewrite ^/dang-nhap$ /home/login.aspx last;
        rewrite ^/shop$ /shop/login.aspx last;
        rewrite ^/shop/$ /shop/login.aspx last;
        rewrite ^/shop/dang-nhap$ /shop/login.aspx last;
        rewrite ^/shop/dang-ky$ /shop/dang-ky.aspx last;
        rewrite ^/shop/trang-chu$ /shop/default.aspx last;
        rewrite ^/shop/noi-bo$ /shop/default.aspx?space=internal last;
        rewrite ^/shop/noi-bo/ban-san-pham$ /admin/he-thong-san-pham/ban-san-pham.aspx?shop_portal=1&space=internal last;
        rewrite ^/shop/ban-san-pham$ /admin/he-thong-san-pham/ban-san-pham.aspx?shop_portal=1&space=public last;
        rewrite ^/shop/san-pham/([0-9]+)$ /home/page/chi-tiet-bai-viet.aspx?shop_portal=1&idbv=$1 last;
        rewrite ^/shop/quan-ly-tin$ /home/quan-ly-tin/default.aspx?shop_portal=1 last;
        rewrite ^/shop/quan-ly-tin/them$ /home/quan-ly-tin/them.aspx?shop_portal=1 last;
        rewrite ^/shop/quan-ly-tin/(.*)$ /home/quan-ly-tin/$1?shop_portal=1 last;
        rewrite ^/shop/trao-doi$ /home/trao-doi.aspx?shop_portal=1 last;
        rewrite ^/shop/them-vao-gio$ /home/them-vao-gio.aspx?shop_portal=1 last;
        rewrite ^/shop/don-chi-tiet$ /home/don-chi-tiet.aspx?shop_portal=1 last;
        rewrite ^/shop/don-ban$ /home/don-ban.aspx?shop_portal=1 last;
        rewrite ^/shop/cho-thanh-toan$ /home/cho-thanh-toan.aspx?shop_portal=1 last;
        rewrite ^/shop/khach-hang$ /home/khach-hang.aspx?shop_portal=1 last;
        rewrite ^/shop/ho-so-tieu-dung$ /home/ho-so-tieu-dung-shop.aspx?shop_portal=1 last;
        rewrite ^/shop/ho-so-uu-dai$ /home/ho-so-uu-dai-shop.aspx?shop_portal=1 last;
        rewrite ^/shop/cap-nhat-ho-so$ /home/edit-info.aspx?shop_portal=1 last;
        rewrite ^/shop/doi-mat-khau$ /home/DoiMatKhau.aspx?shop_portal=1 last;
        rewrite ^/shop/trang-ca-nhan$ /home/taikhoan.aspx?shop_portal=1 last;
        rewrite ^/shop/dong-gop-y-kien$ /home/dong-gop-y-kien.aspx?shop_portal=1 last;
        rewrite ^/shop/page/(.*)$ /home/page/$1?shop_portal=1 last;
        rewrite ^/shop/cong-khai/([a-z0-9-]+)$ /shop/public.aspx?shop_slug=$1 last;
        rewrite ^/gian-hang/([a-z0-9-]+)$ /shop/public.aspx?shop_slug=$1 last;
        rewrite ^/([^/]+)-([0-9]+)\.html$ /home/page/chi-tiet-bai-viet.aspx?idbv=$2 last;
        rewrite ^/([^/]+)-([0-9]+)$ /home/page/ds-bai-viet.aspx?idmn=$2 last;
        rewrite ^/([^/]+)\.info$ /home/default.aspx?user=$1 last;
        try_files $uri $uri/ @mono;
    }

    location ~* \.(aspx|ashx)$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
        fastcgi_param PATH_INFO "";
        fastcgi_param APPL_PHYSICAL_PATH /app;
        fastcgi_param APPL_MD_PATH /;
        fastcgi_param DOCUMENT_ROOT /app;
        fastcgi_param SERVER_NAME $host;
        fastcgi_pass unix:/run/mono/fastcgi.sock;
    }

    location @mono {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param APPL_PHYSICAL_PATH /app;
        fastcgi_param APPL_MD_PATH /;
        fastcgi_param DOCUMENT_ROOT /app;
        fastcgi_param SERVER_NAME $host;
        fastcgi_pass unix:/run/mono/fastcgi.sock;
    }
}
