server {
    listen 80 default_server;
    server_name localhost 127.0.0.1;

    root /app;
    index Default.aspx default.aspx index.html;

    location = /shop/quan-ly-tin/default.aspx {
        return 302 /shop/quan-ly-tin;
    }

    location = /shop/quan-ly-tin/them.aspx {
        return 302 /shop/quan-ly-tin/them;
    }

    location / {
        rewrite ^/test/([^/]+)/([^/]+)\.html$ /url.aspx?id=$1&name=$2 last;
        rewrite ^/bao-tri$ /home/bao-tri.aspx last;
        rewrite ^/dang-nhap$ /home/login.aspx last;
        rewrite ^/shop$ /shop/login.aspx last;
        rewrite ^/shop/$ /shop/login.aspx last;
        rewrite ^/shop/dang-nhap$ /shop/login.aspx last;
        rewrite ^/shop/dang-ky$ /shop/dang-ky.aspx last;
        rewrite ^/shop/trang-chu$ /shop/default.aspx last;
        rewrite ^/shop/san-pham/([0-9]+)$ /home/page/chi-tiet-bai-viet.aspx?shop_portal=1&idbv=$1&$args last;
        rewrite ^/shop/quan-ly-tin$ /home/quan-ly-tin/default.aspx?shop_portal=1&$args last;
        rewrite ^/shop/quan-ly-tin/them$ /home/quan-ly-tin/them.aspx?shop_portal=1&$args last;
        rewrite ^/shop/quan-ly-tin/(.*)$ /home/quan-ly-tin/$1?shop_portal=1&$args last;
        rewrite ^/shop/don-ban$ /home/don-ban.aspx?shop_portal=1&$args last;
        rewrite ^/shop/cho-thanh-toan$ /home/cho-thanh-toan.aspx?shop_portal=1&$args last;
        rewrite ^/shop/khach-hang$ /home/khach-hang.aspx?shop_portal=1&$args last;
        rewrite ^/shop/ho-so-tieu-dung$ /home/ho-so-tieu-dung-shop.aspx?shop_portal=1&$args last;
        rewrite ^/shop/ho-so-uu-dai$ /home/ho-so-uu-dai-shop.aspx?shop_portal=1&$args last;
        rewrite ^/shop/cap-nhat-ho-so$ /home/edit-info.aspx?shop_portal=1&$args last;
        rewrite ^/shop/doi-mat-khau$ /home/DoiMatKhau.aspx?shop_portal=1&$args last;
        rewrite ^/shop/trang-ca-nhan$ /home/taikhoan.aspx?shop_portal=1&$args last;
        rewrite ^/shop/dong-gop-y-kien$ /home/dong-gop-y-kien.aspx?shop_portal=1&$args last;
        rewrite ^/shop/page/(.*)$ /home/page/$1?shop_portal=1&$args last;
        rewrite ^/shop/cong-khai/([a-z0-9-]+)$ /shop/public.aspx?shop_slug=$1&$args last;
        rewrite ^/gian-hang/([a-z0-9-]+)$ /shop/public.aspx?shop_slug=$1&$args last;
        rewrite ^/([^/]+)-([0-9]+)\.html$ /home/page/chi-tiet-bai-viet.aspx?idbv=$2 last;
        rewrite ^/([^/]+)-([0-9]+)$ /home/page/ds-bai-viet.aspx?idmn=$2 last;
        rewrite ^/([^/]+)\.info$ /home/default.aspx?user=$1 last;
        try_files $uri $uri/ @mono;
    }

    location ~* \.(aspx|ashx)$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
        fastcgi_param PATH_INFO "";
        fastcgi_param APPL_PHYSICAL_PATH /app;
        fastcgi_param APPL_MD_PATH /;
        fastcgi_param DOCUMENT_ROOT /app;
        fastcgi_param SERVER_NAME $host;
        fastcgi_pass unix:/run/mono/fastcgi.sock;
    }

    location @mono {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /app$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param APPL_PHYSICAL_PATH /app;
        fastcgi_param APPL_MD_PATH /;
        fastcgi_param DOCUMENT_ROOT /app;
        fastcgi_param SERVER_NAME $host;
        fastcgi_pass unix:/run/mono/fastcgi.sock;
    }
}
