<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trang chủ Khung chat Độc lập</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(130deg, #f6f9ff 0%, #eef4ff 40%, #fef8e7 100%);
      color: #1a2235;
      display: grid;
      place-items: center;
    }
    .box {
      width: min(960px, 92vw);
      border: 1px solid #dfe7f5;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(32, 46, 84, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      margin: 0;
      color: #54607a;
      line-height: 1.6;
      font-size: 22px;
    }
    code,
    a {
      background: #f3f6ff;
      border: 1px solid #dfe7f5;
      border-radius: 8px;
      padding: 2px 8px;
      color: #2a3d76;
      text-decoration: none;
      font-size: 22px;
    }
    .links {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Khung chat độc lập</h1>
    <p>
      Đây là trang xem nhanh ở đường dẫn <code>/</code>. Hãy bấm nút chat ở góc màn hình.<br />
      Bạn có thể chỉnh toàn bộ cấu hình tại trang quản trị rồi quay lại đây để xem ngay.
    </p>
    <div class="links">
      <a href="/admin/">/admin/</a>
      <a href="/demo/">/demo/</a>
    </div>
  </div>
  <script src="./widget/embed.js" defer></script>
</body>
</html>
