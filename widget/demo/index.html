<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xem thử Khung chat</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(130deg, #f6f9ff 0%, #eef4ff 40%, #fef8e7 100%);
      color: #1a2235;
      display: grid;
      place-items: center;
    }
    .box {
      width: min(900px, 92vw);
      border: 1px solid #dfe7f5;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 18px 40px rgba(32, 46, 84, 0.08);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    p {
      margin: 0;
      color: #54607a;
      line-height: 1.6;
    }
    code {
      background: #f3f6ff;
      border: 1px solid #dfe7f5;
      border-radius: 8px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Trang xem thử Khung chat Độc lập</h1>
    <p>
      Đây là trang xem thử để kiểm tra khung chat độc lập. Hãy bấm nút chat ở góc màn hình.<br />
      Bạn có thể sửa giao diện/nội dung tại <code>/admin/</code> rồi quay lại trang này để xem thay đổi.
    </p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || "");
      var script = document.createElement("script");
      script.src = "../widget/embed.js";
      var widgetKey = (params.get("widgetKey") || "").trim();
      var projectId = (params.get("projectId") || "").trim();
      if (widgetKey) {
        script.setAttribute("data-widget-key", widgetKey);
      }
      if (projectId) {
        script.setAttribute("data-project-id", projectId);
      }
      var previewLocal = (params.get("previewLocal") || "").trim().toLowerCase();
      if (previewLocal === "1" || previewLocal === "true") {
        try {
          var raw = window.localStorage.getItem("__AHA_WIDGET_STATIC_BUNDLE_V1__");
          if (raw) {
            var parsed = JSON.parse(raw);
            var blob = new Blob([JSON.stringify(parsed)], { type: "application/json;charset=utf-8" });
            var blobUrl = URL.createObjectURL(blob);
            script.setAttribute("data-config-url", blobUrl);
            script.addEventListener("load", function () {
              window.setTimeout(function () {
                URL.revokeObjectURL(blobUrl);
              }, 5000);
            }, { once: true });
          }
        } catch (_) {}
      }
      script.defer = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
