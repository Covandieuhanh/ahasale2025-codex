services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ahasale_local_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AhaSaleLocal#2026"
      MSSQL_PID: "Developer"
    ports:
      - "11433:1433"
    volumes:
      - ahasale_mssql_data:/var/opt/mssql
      - ./docker/sql/backup:/var/opt/mssql/backup:ro

  init-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      - db
    environment:
      MSSQL_SA_PASSWORD: "AhaSaleLocal#2026"
      LOCAL_DB_NAME: "${LOCAL_DB_NAME:-ahasale_local}"
    volumes:
      - ./docker/sql/backup:/var/opt/mssql/backup:ro
      - ./docker/sql/init-db.sh:/init-db.sh:ro
    entrypoint: ["/bin/bash", "/init-db.sh"]
    restart: "no"

  web:
    build:
      context: ./docker/web
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./:/app
    ports:
      - "80:80"
      - "443:443"

  admin:
    build:
      context: ./docker/web
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      ADMIN_PORTAL: "true"
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./:/app
    ports:
      - "8081:443"

volumes:
  ahasale_mssql_data:
